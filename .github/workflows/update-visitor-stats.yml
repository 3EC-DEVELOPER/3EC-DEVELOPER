name: Update Visitor Stats

on:
  schedule:
    - cron: '0 * * * *'  # Run every hour
  workflow_dispatch:     # Allow manual trigger

jobs:
  update-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch visitor stats from GoatCounter
        id: fetch-stats
        run: |
          # Fetch stats with proper error handling
          STATS=$(curl -s -w "\n%{http_code}" -H "Authorization: Bearer ${{ secrets.GOATCOUNTER_API_TOKEN }}" \
            "https://douglasforbesscott.goatcounter.com/api/v0/stats/")

          HTTP_CODE=$(echo "$STATS" | tail -n1)
          STATS_DATA=$(echo "$STATS" | head -n-1)

          echo "Stats HTTP Code: $HTTP_CODE"
          echo "Stats Response: $STATS_DATA"

          REFERRERS=$(curl -s -w "\n%{http_code}" -H "Authorization: Bearer ${{ secrets.GOATCOUNTER_API_TOKEN }}" \
            "https://douglasforbesscott.goatcounter.com/api/v0/stats/referrers")

          REF_HTTP_CODE=$(echo "$REFERRERS" | tail -n1)
          REFERRERS_DATA=$(echo "$REFERRERS" | head -n-1)

          echo "Referrers HTTP Code: $REF_HTTP_CODE"
          echo "Referrers Response: $REFERRERS_DATA"

          # Parse stats - handle array response
          TOTAL_VISITORS=$(echo "$STATS_DATA" | jq -r 'map(.count) | add // 0' 2>/dev/null || echo "0")
          UNIQUE_VISITORS=$(echo "$STATS_DATA" | jq -r 'map(.unique_count) | add // 0' 2>/dev/null || echo "0")
          LINKEDIN_REFS=$(echo "$REFERRERS_DATA" | jq -r '[.[] | select(.referrer | contains("linkedin")) | .count] | add // 0' 2>/dev/null || echo "0")
          DAYS=$(echo "$STATS_DATA" | jq -r 'length // 1' 2>/dev/null || echo "1")

          if [ "$DAYS" -gt 0 ] && [ "$TOTAL_VISITORS" -gt 0 ]; then
            DAILY_AVG=$(echo "scale=1; $TOTAL_VISITORS / $DAYS" | bc 2>/dev/null || echo "0")
          else
            DAILY_AVG="0"
          fi

          echo "total_visitors=$TOTAL_VISITORS" >> $GITHUB_OUTPUT
          echo "unique_visitors=$UNIQUE_VISITORS" >> $GITHUB_OUTPUT
          echo "linkedin_refs=$LINKEDIN_REFS" >> $GITHUB_OUTPUT
          echo "daily_avg=$DAILY_AVG" >> $GITHUB_OUTPUT

          echo "Parsed - Total: $TOTAL_VISITORS, Unique: $UNIQUE_VISITORS, LinkedIn: $LINKEDIN_REFS, Days: $DAYS, Daily Avg: $DAILY_AVG"

      - name: Update README
        env:
          TOTAL_VISITORS: ${{ steps.fetch-stats.outputs.total_visitors }}
          UNIQUE_VISITORS: ${{ steps.fetch-stats.outputs.unique_visitors }}
          LINKEDIN_REFS: ${{ steps.fetch-stats.outputs.linkedin_refs }}
          DAILY_AVG: ${{ steps.fetch-stats.outputs.daily_avg }}
        run: |
          python3 << 'PYTHON_EOF'
          import re
          import os

          total = os.environ.get('TOTAL_VISITORS', '0')
          unique = os.environ.get('UNIQUE_VISITORS', '0')
          linkedin = os.environ.get('LINKEDIN_REFS', '0')
          daily = os.environ.get('DAILY_AVG', '0')

          with open('README.md', 'r') as f:
            content = f.read()

          # Build the analytics section
          analytics_section = (
              '## Visitor Analytics\n\n'
              '| 👁️ Total | 👤 Unique | 🔗 LinkedIn | 📊 Daily |\n'
              '|:---:|:---:|:---:|:---:|\n'
              f'| {total} | {unique} | {linkedin} | {daily} |'
          )

          # Find and replace the analytics section
          if '## Visitor Analytics' in content:
              # Match from ## Visitor Analytics to the next --- or ## Get in touch
              pattern = r'(## Visitor Analytics\n\n.*?)(?=\n---|\n## Get in touch)'
              content = re.sub(pattern, analytics_section, content, count=1, flags=re.DOTALL)
          else:
              # If section doesn't exist, add it before Get in touch
              content = content.replace('## Get in touch', analytics_section + '\n\n---\n\n## Get in touch')

          with open('README.md', 'w') as f:
              f.write(content)

          print(f"README updated: Total={total}, Unique={unique}, LinkedIn={linkedin}, Daily={daily}")
          PYTHON_EOF

      - name: Commit and push changes
        run: |
          git config user.email "Douglas.Forbes-Scott@3ec.co.uk"
          git config user.name "Douglas Forbes-Scott"

          if git diff --quiet README.md; then
            echo "No changes to commit"
          else
            git add README.md
            git commit -m "chore: update visitor analytics [skip ci]"
            git push
          fi
