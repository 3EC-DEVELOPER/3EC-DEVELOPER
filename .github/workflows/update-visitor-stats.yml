name: Update Visitor Stats

on:
  schedule:
    - cron: '0 * * * *'  # Run every hour
  workflow_dispatch:     # Allow manual trigger

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch visitor stats from GitHub Traffic API
        id: fetch-stats
        run: |
          VIEWS=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GH_TRAFFIC_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/3EC-DEVELOPER/3EC-DEVELOPER/traffic/views")

          REFERRERS=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GH_TRAFFIC_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/3EC-DEVELOPER/3EC-DEVELOPER/traffic/popular/referrers")

          echo "Views response: $VIEWS"
          echo "Referrers response: $REFERRERS"

          TOTAL_VISITORS=$(echo "$VIEWS" | jq -r '.count // 0')
          UNIQUE_VISITORS=$(echo "$VIEWS" | jq -r '.uniques // 0')
          LINKEDIN_REFS=$(echo "$REFERRERS" | jq -r '[.[] | select(.referrer | ascii_downcase | contains("linkedin")) | .count] | add // 0')
          DAYS=$(echo "$VIEWS" | jq -r '(.views | length) // 1')

          if [ "$DAYS" -gt 0 ] && [ "$TOTAL_VISITORS" -gt 0 ]; then
            DAILY_AVG=$(echo "scale=1; $TOTAL_VISITORS / $DAYS" | bc 2>/dev/null || echo "0")
          else
            DAILY_AVG="0"
          fi

          echo "total_visitors=$TOTAL_VISITORS" >> $GITHUB_OUTPUT
          echo "unique_visitors=$UNIQUE_VISITORS" >> $GITHUB_OUTPUT
          echo "linkedin_refs=$LINKEDIN_REFS" >> $GITHUB_OUTPUT
          echo "daily_avg=$DAILY_AVG" >> $GITHUB_OUTPUT

      - name: Generate visitor stats SVG
        env:
          TOTAL_VISITORS: ${{ steps.fetch-stats.outputs.total_visitors }}
          UNIQUE_VISITORS: ${{ steps.fetch-stats.outputs.unique_visitors }}
          LINKEDIN_REFS: ${{ steps.fetch-stats.outputs.linkedin_refs }}
          DAILY_AVG: ${{ steps.fetch-stats.outputs.daily_avg }}
        run: |
          python3 << 'PYTHON_EOF'
          import os

          total = os.environ.get('TOTAL_VISITORS', '0')
          unique = os.environ.get('UNIQUE_VISITORS', '0')
          linkedin = os.environ.get('LINKEDIN_REFS', '0')
          daily = os.environ.get('DAILY_AVG', '0')

          EYE_PATH    = 'M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zm0 12.5c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z'
          PERSON_PATH = 'M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'
          LI_PATH     = 'M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z'

          def font_size(value):
              return 40 if len(str(value)) <= 4 else 32 if len(str(value)) <= 6 else 24

          # cx values for each card centre
          centres = [108, 311, 514, 717]
          cards = [
              (total,   'TOTAL VISITORS', f'<g transform="translate({centres[0]-14},29) scale(1.1667)" fill="#8b949e"><path d="{EYE_PATH}"/></g>'),
              (unique,  'UNIQUE',         f'<g transform="translate({centres[1]-14},29) scale(1.1667)" fill="#8b949e"><path d="{PERSON_PATH}"/></g>'),
              (linkedin,'LINKEDIN',       f'<g transform="translate({centres[2]-14},29) scale(1.1667)" fill="#0A66C2" fill-rule="evenodd"><path d="{LI_PATH}"/></g>'),
              (daily,   'DAILY AVG',      f'<rect x="{centres[3]-14}" y="43" width="6" height="14" rx="1" fill="#3fb950"/><rect x="{centres[3]-5}" y="29" width="6" height="28" rx="1" fill="#f85149"/><rect x="{centres[3]+4}" y="36" width="6" height="21" rx="1" fill="#58a6ff"/>'),
          ]

          card_rects = ''
          for i, (value, label, icon_svg) in enumerate(cards):
              x = 12 + i * 203
              cx = centres[i]
              fs = font_size(value)
              card_rects += f'''
            <rect x="{x}" y="12" width="193" height="151" rx="8" fill="#252c37"/>
            {icon_svg}
            <text x="{cx}" y="82" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="10" fill="#8b949e" letter-spacing="1.5" font-weight="600">{label}</text>
            <text x="{cx}" y="130" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="{fs}" font-weight="700" fill="#f0f6fc">{value}</text>'''

          svg = f'''<svg width="830" height="175" viewBox="0 0 830 175" xmlns="http://www.w3.org/2000/svg">
            <rect width="830" height="175" rx="12" fill="#1b1f24"/>{card_rects}
          </svg>'''

          with open('assets/visitor-stats.svg', 'w') as f:
              f.write(svg)

          print(f"SVG generated: Total={total}, Unique={unique}, LinkedIn={linkedin}, Daily={daily}")
          PYTHON_EOF

      - name: Commit and push SVG
        run: |
          git config user.email "Douglas.Forbes-Scott@3ec.co.uk"
          git config user.name "Douglas Forbes-Scott"

          if git diff --quiet assets/visitor-stats.svg; then
            echo "No changes to commit"
          else
            git add assets/visitor-stats.svg
            git commit -m "chore: update visitor analytics [skip ci]"
            git push
          fi
