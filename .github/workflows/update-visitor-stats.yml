name: Update Visitor Stats

on:
  schedule:
    - cron: '0 * * * *'  # Run every hour
  workflow_dispatch:     # Allow manual trigger

jobs:
  update-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch visitor stats from GoatCounter
        id: fetch-stats
        run: |
          RESPONSE=$(curl -s -H "Authorization: Bearer ${{ secrets.GOATCOUNTER_API_TOKEN }}" \
            "https://douglasforbesscott.goatcounter.com/api/v0/stats")

          echo "API Response: $RESPONSE"

          TOTAL_VISITORS=$(echo "$RESPONSE" | jq -r '.[0].count // 0' 2>/dev/null || echo "0")
          UNIQUE_VISITORS=$(echo "$RESPONSE" | jq -r 'length // 0' 2>/dev/null || echo "0")

          echo "total_visitors=$TOTAL_VISITORS" >> $GITHUB_OUTPUT
          echo "unique_visitors=$UNIQUE_VISITORS" >> $GITHUB_OUTPUT

      - name: Update README
        env:
          TOTAL_VISITORS: ${{ steps.fetch-stats.outputs.total_visitors }}
          UNIQUE_VISITORS: ${{ steps.fetch-stats.outputs.unique_visitors }}
        run: |
          python3 << 'EOF'
          import re
          import os

          total = os.environ.get('TOTAL_VISITORS', '0')
          unique = os.environ.get('UNIQUE_VISITORS', '0')

          with open('README.md', 'r') as f:
            content = f.read()

          analytics_section = "## Visitor Analytics\n\n<div align=\"center\">\n\n![Visitors](https://img.shields.io/badge/Visitors-" + total + "-blue?style=flat-square)\n![Unique](https://img.shields.io/badge/Unique-" + unique + "-green?style=flat-square)\n\n[GoatCounter Dashboard](https://douglasforbesscott.goatcounter.com)\n\n</div>"

          if '## Visitor Analytics' in content:
            start = content.find('## Visitor Analytics')
            end = content.find('---', start)
            if end == -1:
              end = content.find('## Get in touch', start)
            content = content[:start] + analytics_section + '\n\n' + content[end:]
          else:
            content = content.replace(
              '## Get in touch',
              analytics_section + '\n\n## Get in touch'
            )

          with open('README.md', 'w') as f:
            f.write(content)

          print("README updated successfully")
          EOF

      - name: Commit and push changes
        run: |
          git config user.email "Douglas.Forbes-Scott@3ec.co.uk"
          git config user.name "Douglas Forbes-Scott"

          if git diff --quiet README.md; then
            echo "No changes to commit"
          else
            git add README.md
            git commit -m "chore: update visitor analytics [skip ci]"
            git push
          fi
